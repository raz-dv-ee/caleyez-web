<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CalEyeZ</title>
<style>
  :root{--bg:#0b0f15;--panel:#151b24;--panel2:#1c2531;--line:#2a3440;--ink:#eaf1f8;--mut:#8b98a8;
        --accent:#39d0c4;--blue:#58a6ff;--green:#3fb950;--amber:#d29922;--red:#f85149}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:16px/1.45 system-ui,'Segoe UI',Roboto,sans-serif;overscroll-behavior:none}
  #app{max-width:520px;margin:auto;min-height:100%;display:flex;flex-direction:column;padding:14px;gap:12px}
  header{display:flex;align-items:center;gap:10px}
  header .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--blue));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#04121a}
  header h1{font-size:19px;margin:0;letter-spacing:.3px} header .sub{font-size:11px;color:var(--mut)}
  .stage{position:relative;aspect-ratio:1/1;background:#000;border-radius:18px;overflow:hidden;border:1px solid var(--line)}
  video,#shot{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #shot{display:none;object-fit:contain;background:#000}
  .roi{position:absolute;left:20%;top:20%;width:60%;height:60%;border:2px solid rgba(57,208,196,.9);
    border-radius:14px;box-shadow:0 0 0 100vmax rgba(0,0,0,.35);pointer-events:none}
  .roi::after{content:'place food here';position:absolute;bottom:6px;left:0;right:0;text-align:center;
    font-size:11px;color:rgba(255,255,255,.85)}
  .controls{display:flex;gap:10px;align-items:center}
  input[type=number]{flex:0 0 96px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:12px;padding:12px;font-size:16px}
  .btn{flex:1;background:linear-gradient(135deg,var(--accent),var(--blue));color:#04121a;border:0;border-radius:14px;
    padding:15px;font-size:17px;font-weight:800;cursor:pointer}
  .btn:disabled{opacity:.5} .mini{background:var(--panel);border:1px solid var(--line);color:var(--mut);
    border-radius:12px;padding:12px 14px;font-size:13px;cursor:pointer}
  .result{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;display:none}
  .result.show{display:block;animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .food{font-size:26px;font-weight:800;text-transform:capitalize}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
  .chip{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
  .chip.g{color:var(--blue);border-color:rgba(88,166,255,.4)} .chip.i{color:var(--accent);border-color:rgba(57,208,196,.4)}
  .chip.warn{color:var(--amber);border-color:rgba(210,153,34,.5)}
  .kcal{font-size:40px;font-weight:800;margin-top:10px} .kcal small{font-size:15px;color:var(--mut);font-weight:600}
  .macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .macro{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center}
  .macro b{display:block;font-size:18px} .macro span{font-size:11px;color:var(--mut)}
  .foot{font-size:11px;color:var(--mut);text-align:center;margin-top:auto;padding-top:6px}
  #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;z-index:50}
  #splash .logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--blue));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;color:#04121a}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}} #splash .t{color:var(--mut);font-size:14px}
</style>

<div id="splash">
  <div class="logo">C</div>
  <div class="spin"></div>
  <div class="t" id="splashText">loading models…</div>
</div>

<div id="app">
  <header>
    <div class="logo">C</div>
    <div><h1>CalEyeZ</h1><div class="sub">on-device food + calories · <span id="epTag">—</span></div></div>
  </header>

  <div class="stage">
    <video id="cam" autoplay playsinline muted></video>
    <img id="shot">
    <div class="roi"></div>
  </div>

  <div class="controls">
    <input id="grams" type="number" inputmode="numeric" placeholder="grams" min="0">
    <button class="btn" id="analyze" disabled>Analyze</button>
  </div>
  <div class="controls">
    <button class="mini" id="scaleBtn">⚖ connect scale</button>
    <button class="mini" id="switchCam">⟳ camera</button>
    <button class="mini" id="retake" style="display:none">↺ live</button>
    <span class="chip" id="status" style="margin-left:auto">warming up…</span>
  </div>

  <div class="result" id="result">
    <div class="food" id="rFood">—</div>
    <div class="meta" id="rMeta"></div>
    <div class="kcal" id="rKcal"></div>
    <div class="macros" id="rMacros"></div>
    <button class="btn" id="logBtn" style="margin-top:12px;font-size:15px">＋ Log meal</button>
  </div>

  <div class="result" id="histCard">
    <div style="display:flex;align-items:baseline;justify-content:space-between">
      <b>Today</b><span class="chip" id="histTotal">0 kcal</span>
    </div>
    <div id="histList" style="margin-top:8px;font-size:14px"></div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="mini" id="histCsv">export CSV</button>
      <button class="mini" id="histClear">clear</button>
    </div>
  </div>

  <div class="foot">Same models & preprocessing as the desktop system · runs entirely on your device</div>
</div>

<canvas id="cv" hidden></canvas>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.webgpu.min.js"></script>
<script>
const $=id=>document.getElementById(id);
ort.env.wasm.wasmPaths="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";
ort.env.wasm.numThreads=1;

// ---- exact desktop constants ----
const G_SZ=320, I_SZ=224, ROI_FRAC=0.60;
const GATE_G=0.55, GATE_I=0.60, BOTH_UNSURE=0.50, ARB_BAND=0.15;
// USDA lookup goes through YOUR proxy (Cloudflare Worker) so the key never ships in this public repo.
// Set this to your Worker URL, e.g. "https://caleyez-usda.<you>.workers.dev". Empty = local DB only.
const USDA_PROXY="";
// 20 features in the arbiter's training order (train_arbiter_xgb.py FEATS)
let G=null, I=null, ARB=null, namesG=null, namesI=null, iBg=null, NUTR={}, frozen=false;

// XGBoost arbiter evaluated in JS (onnxruntime-web has no TreeEnsemble op). Verified == Python to 1e-7.
function arbiterP(f){
  let m=ARB.base;
  for(const tree of ARB.trees){
    let n=tree["0"];
    while(n.length>1){ n = tree[ f[n[0]] < n[1] ? n[2] : n[3] ]; }  // [f,t,yes,no] -> leaf [v]
    m += n[0];
  }
  return 1/(1+Math.exp(-m));                                        // P(israeli)
}

// nutrition: local JSON first, then USDA via proxy (cached into NUTR so re-renders stay instant)
async function ensureNutrition(label){
  if(!label || NUTR[label]!==undefined) return;
  if(!USDA_PROXY){ NUTR[label]=null; return; }
  try{
    const r=await fetch(USDA_PROXY+'?q='+encodeURIComponent(label.replace(/_/g,' ')));
    const j=r.ok ? await r.json() : null;
    NUTR[label]=(j && j.kcal!=null) ? j : null;
  }catch(e){ NUTR[label]=null; }
}

async function mk(url,ep){return ort.InferenceSession.create(await (await fetch(url)).arrayBuffer(),{executionProviders:ep});}

async function boot(){
  try{
    const gpu = !!navigator.gpu && window.isSecureContext;
    const ep = gpu ? ['webgpu','wasm'] : ['wasm'];
    const pr = gpu ? 'fp16' : 'fp16';                 // fp16 works on both; smallest that keeps accuracy
    $("epTag").textContent = gpu ? 'WebGPU (GPU)' : 'WASM (CPU)';
    $("splashText").textContent="loading models…";
    G=await mk('models/global_'+pr+'.onnx',ep);
    I=await mk('models/israeli_'+pr+'.onnx',ep);
    ARB=await (await fetch('models/arbiter_trees.json')).json();   // XGBoost trees, evaluated in JS
    namesG=await (await fetch('models/global_names.json')).json();
    namesI=await (await fetch('models/israeli_names.json')).json();
    iBg=Object.keys(namesI).find(k=>namesI[k]==='background');
    NUTR=await (await fetch('nutrition.json')).json();
    $("splashText").textContent="warming up…";
    await warmup();                                    // compile kernels now so first photo is fast
    await startCam();
    $("splash").style.display='none';
    $("analyze").disabled=false; $("status").textContent='ready';
  }catch(e){ $("splashText").textContent="error: "+e.message; }
}

async function warmup(){
  const cv=$("cv"), ctx=cv.getContext('2d');
  cv.width=G_SZ;cv.height=G_SZ;ctx.fillStyle='#333';ctx.fillRect(0,0,G_SZ,G_SZ);
  await G.run({[G.inputNames[0]]:tensorFromCanvas(cv,G_SZ)});
  cv.width=I_SZ;cv.height=I_SZ;ctx.fillStyle='#333';ctx.fillRect(0,0,I_SZ,I_SZ);
  await I.run({[I.inputNames[0]]:tensorFromCanvas(cv,I_SZ)});
}

// ---- preprocessing: central ROI(0.60) square -> resize to sz -> /255 RGB CHW (matches desktop) ----
function drawROI(sz){
  const v=$("cam"), src = frozen ? $("shot") : v;
  const w=src.videoWidth||src.naturalWidth, h=src.videoHeight||src.naturalHeight;
  const s=Math.round(Math.min(w,h)*ROI_FRAC), sx=Math.round((w-s)/2), sy=Math.round((h-s)/2);
  const cv=$("cv");cv.width=sz;cv.height=sz;const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  ctx.drawImage(src,sx,sy,s,s,0,0,sz,sz);            // square ROI -> sz x sz
  return cv;
}
function tensorFromCanvas(cv,sz){
  const d=cv.getContext('2d').getImageData(0,0,sz,sz).data, n=sz*sz, out=new Float32Array(3*n);
  for(let i=0;i<n;i++){out[i]=d[i*4]/255;out[i+n]=d[i*4+1]/255;out[i+2*n]=d[i*4+2]/255;}
  return new ort.Tensor('float32',out,[1,3,sz,sz]);
}

function feats(probsF32, names, bgKey){
  const p=Array.from(probsF32);
  const idx=p.map((v,i)=>[v,i]).sort((a,b)=>b[0]-a[0]);
  const conf=[0,1,2,3,4].map(k=>idx[k]?idx[k][0]:0);
  let H=0; for(const v of p){const c=Math.min(Math.max(v,1e-12),1); H-=c*Math.log(c);}
  const pbg = bgKey!=null ? p[+bgKey] : 0;
  return {label:names[idx[0][1]], conf, entropy:H, margin:conf[0]-conf[1], pbg};
}

async function analyze(){
  if(!frozen){ // freeze current frame
    const v=$("cam"),c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);$("shot").src=c.toDataURL('image/jpeg',0.92);
    $("shot").style.display='block';$("cam").style.display='none';$("retake").style.display='';frozen=true;
    await new Promise(r=>{$("shot").onload=r; if($("shot").complete)r();});
  }
  $("status").textContent='analyzing…';
  const go=await G.run({[G.inputNames[0]]:tensorFromCanvas(drawROI(G_SZ),G_SZ)});
  const io=await I.run({[I.inputNames[0]]:tensorFromCanvas(drawROI(I_SZ),I_SZ)});
  const g=feats(Object.values(go)[0].data, namesG, null);
  const i=feats(Object.values(io)[0].data, namesI, iBg);

  const f=[g.conf[0],g.conf[1],g.conf[2],g.conf[3],g.conf[4], g.entropy,g.margin,
           i.conf[0],i.conf[1],i.conf[2],i.conf[3],i.conf[4], i.entropy,i.margin, i.pbg,
           g.conf[0]-i.conf[0], g.conf[0]/(i.conf[0]+1e-6), i.entropy-g.entropy, g.margin-i.margin,
           ((g.conf[0]<0.5)&&(i.conf[0]<0.5))?1:0];
  const pIsr=arbiterP(f);

  const routeI=pIsr>=0.5, chosen=routeI?i:g, gate=routeI?GATE_I:GATE_G;
  const bothUnsure=g.conf[0]<BOTH_UNSURE && i.conf[0]<BOTH_UNSURE;
  const arbUnsure=Math.abs(pIsr-0.5)<ARB_BAND;
  const abstain=routeI && chosen.label==='background';
  const confident=chosen.conf[0]>=gate && !bothUnsure && !arbUnsure && !abstain;
  last={chosen, routeI, pIsr, confident, abstain};
  render(last);
  if(!abstain){ await ensureNutrition(chosen.label); render(last); }   // fill USDA if not in local DB
  $("status").textContent='done';
}
let last=null;

function render({chosen, routeI, pIsr, confident, abstain}){
  const pretty=s=>s.replace(/_/g,' ');
  const label = abstain ? 'not recognized' : pretty(chosen.label);
  $("rFood").textContent=label;
  const meta=[];
  meta.push(`<span class="chip ${routeI?'i':'g'}">${routeI?'Israeli expert':'Global expert'}</span>`);
  meta.push(`<span class="chip">${(chosen.conf[0]*100).toFixed(0)}% conf</span>`);
  meta.push(`<span class="chip">P(israeli)=${pIsr.toFixed(2)}</span>`);
  if(!confident) meta.push(`<span class="chip warn">low confidence</span>`);
  $("rMeta").innerHTML=meta.join('');

  const g=+$("grams").value, key=abstain?null:chosen.label, nut=key&&NUTR[key];
  if(nut && g>0){
    const r=g/100;
    $("rKcal").innerHTML=`${Math.round(nut.kcal*r)} <small>kcal · ${g} g</small>`;
    $("rMacros").innerHTML=[['pro','protein'],['carb','carbs'],['fat','fat']]
      .map(([k,l])=>`<div class="macro"><b>${(nut[k]*r).toFixed(1)}g</b><span>${l}</span></div>`).join('');
  }else{
    $("rKcal").innerHTML = g>0 ? `<small>no local nutrition for “${pretty(chosen.label)}”</small>`
                               : `<small>enter grams for calories</small>`;
    $("rMacros").innerHTML='';
  }
  $("result").classList.add('show');
}

// ---- camera ----
let devices=[], camIdx=0, stream=null;
async function startCam(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  try{
    stream=await navigator.mediaDevices.getUserMedia({video: devices.length?{deviceId:devices[camIdx].deviceId}:{facingMode:'environment'}});
    $("cam").srcObject=stream;
    if(!devices.length){devices=(await navigator.mediaDevices.enumerateDevices()).filter(d=>d.kind==='videoinput');}
  }catch(e){$("status").textContent='camera: '+e.message;}
}
$("switchCam").onclick=async()=>{if(devices.length>1){camIdx=(camIdx+1)%devices.length;await startCam();}};
$("retake").onclick=()=>{frozen=false;$("shot").style.display='none';$("cam").style.display='';$("retake").style.display='none';$("result").classList.remove('show');};
$("analyze").onclick=()=>{analyze().catch(e=>{$("status").textContent='err: '+e.message;alert(e.message);});};
$("grams").oninput=()=>{ if(last) render(last); };   // recompute nutrition only, no re-inference

// ---- BLE scale (SWAN): same decode as scripts/ble/scale_reader.py ----
let wbuf=[];
async function connectScale(){
  if(!navigator.bluetooth){ alert("This browser has no Web Bluetooth (use Chrome on Android)."); return; }
  try{
    $("scaleBtn").textContent='⚖ scanning…';
    const dev=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'SWAN'}],
      optionalServices:[0xffb0,0xfff0,0xffe0,0x181d,
        '0000ffb0-0000-1000-8000-00805f9b34fb','0000fff0-0000-1000-8000-00805f9b34fb']});
    const gatt=await dev.gatt.connect();
    let ch=null;
    for(const s of await gatt.getPrimaryServices()){
      for(const c of await s.getCharacteristics()){ if(c.uuid.includes('ffb2')){ ch=c; break; } }
      if(ch) break;
    }
    if(!ch) throw new Error("weight characteristic (ffb2) not found — tell me the scale's service UUID");
    await ch.startNotifications();
    ch.addEventListener('characteristicvaluechanged', onWeight);
    dev.addEventListener('gattserverdisconnected', ()=>{$("scaleBtn").textContent='⚖ reconnect';});
    $("scaleBtn").textContent='⚖ scale ✓';
  }catch(e){ $("scaleBtn").textContent='⚖ connect scale'; if(e.name!=='NotFoundError') alert('scale: '+e.message); }
}
function onWeight(e){
  const d=e.target.value; if(d.byteLength<8) return;
  const low=d.getUint8(4), high=d.getUint8(5)|d.getUint8(3);   // do NOT mask bit0 (drops 256 g)
  wbuf.push(low+high*256); if(wbuf.length>5) wbuf.shift();
  const s=[...wbuf].sort((a,b)=>a-b); const med=s[s.length>>1]; // median rejects flicker/overshoot
  $("grams").value=med; if(last) render(last);
}
$("scaleBtn").onclick=connectScale;

// ---- meal log (on-device, localStorage) ----
const LKEY='caleyez_log';
const loadLog=()=>{try{return JSON.parse(localStorage.getItem(LKEY)||'[]');}catch(e){return [];}};
const saveLog=a=>localStorage.setItem(LKEY,JSON.stringify(a));
function logMeal(){
  if(!last || last.abstain){ alert('Nothing to log yet — analyze a recognized food first.'); return; }
  const g=+$("grams").value||0, nut=NUTR[last.chosen.label], r=g/100;
  const row={ts:Date.now(), food:last.chosen.label, grams:g, expert:last.routeI?'israeli':'global',
    kcal:(nut&&g)?Math.round(nut.kcal*r):null,
    pro:(nut&&g)?+(nut.pro*r).toFixed(1):null, carb:(nut&&g)?+(nut.carb*r).toFixed(1):null, fat:(nut&&g)?+(nut.fat*r).toFixed(1):null};
  const a=loadLog(); a.push(row); saveLog(a); renderHistory();
  $("logBtn").textContent='✓ logged'; setTimeout(()=>$("logBtn").textContent='＋ Log meal',1200);
}
function renderHistory(){
  const a=loadLog(), t0=new Date().setHours(0,0,0,0), today=a.filter(r=>r.ts>=t0);
  if(!a.length){ $("histCard").classList.remove('show'); return; }
  $("histCard").classList.add('show');
  $("histTotal").textContent=today.reduce((s,r)=>s+(r.kcal||0),0)+' kcal';
  $("histList").innerHTML=today.slice(-6).reverse().map(r=>{
    const tm=new Date(r.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    return `<div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:5px 0">
      <span style="text-transform:capitalize">${r.food.replace(/_/g,' ')} <span style="color:var(--mut)">${r.grams}g · ${tm}</span></span>
      <b>${r.kcal!=null?r.kcal+' kcal':'—'}</b></div>`;
  }).join('') || '<span class="chip">no entries today</span>';
}
$("logBtn").onclick=logMeal;
$("histClear").onclick=()=>{ if(confirm('Clear all logged meals?')){saveLog([]);renderHistory();} };
$("histCsv").onclick=()=>{
  const a=loadLog(); if(!a.length)return;
  const head='datetime,food,grams,expert,kcal,protein,carb,fat';
  const rows=a.map(r=>[new Date(r.ts).toISOString(),r.food,r.grams,r.expert,r.kcal,r.pro,r.carb,r.fat].join(','));
  const blob=new Blob([head+'\n'+rows.join('\n')],{type:'text/csv'});
  const u=URL.createObjectURL(blob),link=document.createElement('a');link.href=u;link.download='caleyez_log.csv';link.click();
};

boot();
renderHistory();
</script>
